workflows:
  ios-testflight:
    name: iOS TestFlight build
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Must match the App Store Connect API key name added in the Codemagic
      # UI: Team settings → Integrations → App Store Connect → name it exactly
      # "UmbraReaderASC".
      app_store_connect: UmbraReaderASC
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        # Codemagic env-var group holding CERTIFICATE_PRIVATE_KEY (the RSA key
        # used to create/own our iOS signing certificate). Create it in the
        # Codemagic UI: app → Environment variables → add CERTIFICATE_PRIVATE_KEY
        # (mark Secure) to a group named "signing".
        - signing
      vars:
        BUNDLE_ID: "com.fiammettainfernali.umbrareader"
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      # NOTE: no `ios_signing:` block here on purpose. That block triggers
      # Codemagic's built-in automatic signing, which only *fetches* existing
      # profiles and fails with "No matching profiles found" when none exist.
      # We instead create the cert + profile explicitly in the "Set up code
      # signing" script below using `app-store-connect ... --create`.
    # No `triggering:` block — builds are started MANUALLY from the Codemagic
    # UI ("Start new build"). Auto-building on every push uploaded a build to
    # App Store Connect each commit and hit Apple's daily upload limit
    # (error 90382). Commit freely; build when a batch is worth testing.
    scripts:
      - name: Set up code signing
        script: |
          # Create the dev certificate + provisioning profile if they don't
          # exist yet (--create). --certificate-key supplies our own RSA key
          # so the tool can create and own a usable signing certificate;
          # without it the run fails with "Cannot save Signing Certificates
          # without certificate private key". The profile includes every
          # device registered in the Apple Developer portal at build time.
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Flutter pub get
        script: flutter pub get
      - name: Analyze + test
        script: |
          # Gate the build on the full suite — a broken build should fail
          # here in seconds, not after 15 minutes of Xcode.
          flutter analyze
          flutter test
      # No explicit `pod install` — a fresh `flutter create` project has no
      # ios/Podfile until Flutter generates one. `flutter build ipa` runs
      # CocoaPods (and generates the Podfile) itself as part of the build.
      - name: Flutter build IPA
        script: |
          # --build-number=$BUILD_NUMBER: TestFlight rejects duplicate build
          # numbers, so use Codemagic's auto-incrementing build counter for
          # CFBundleVersion. The version name (1.0.0) stays from pubspec.yaml.
          # SENTRY_DSN: optional Codemagic env var (add it to the "signing"
          # group, mark Secure). When unset, crash reporting is compiled out
          # and the app runs exactly as before.
          flutter build ipa \
            --release \
            --build-number=$BUILD_NUMBER \
            --dart-define=SENTRY_DSN=${SENTRY_DSN:-} \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - smith.jessi.personal@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        # Uploads the IPA to App Store Connect. `auth: integration` reuses the
        # UmbraReaderASC API key integration. We deliberately do NOT set
        # `submit_to_testflight` — that submits for EXTERNAL beta review, which
        # requires test info + Apple review. Internal testers (you) receive
        # every uploaded build automatically with no review, so upload alone
        # is all we need.
        auth: integration
