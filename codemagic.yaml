workflows:
  ios-dev-sideload:
    name: iOS dev build (sideload IPA)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Must match the App Store Connect API key name added in the Codemagic
      # UI: Team settings → Integrations → App Store Connect → name it exactly
      # "UmbraReaderASC".
      app_store_connect: UmbraReaderASC
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.fiammettainfernali.umbrareader"
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      ios_signing:
        # Automatic signing — Codemagic creates/fetches the development
        # certificate + provisioning profile using the API key above.
        distribution_type: development
        bundle_identifier: "com.fiammettainfernali.umbrareader"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Pod install
        script: |
          cd ios
          pod install
      - name: Set up signing
        script: |
          xcode-project use-profiles
      - name: Flutter build IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - smith.jessi.personal@gmail.com
        notify:
          success: true
          failure: true
