name: umbra_reader
description: "Umbra Reader — a cozy EPUB & OPDS reading app: offline library, themes, highlights, stats, and iCloud sync."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
# Version *name* (marketing version). The +build number here is a local
# placeholder — Codemagic overrides it with --build-number=$BUILD_NUMBER.
version: 1.1.0+1

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Networking + OPDS feed parsing.
  http: ^1.2.2
  xml: ^7.0.1

  # Persisting the OPDS server connection settings.
  shared_preferences: ^2.3.2

  # Locating the on-device documents directory for downloaded EPUBs.
  path_provider: ^2.1.5

  # EPUB reading: archive unzips the .epub, html parses chapter XHTML.
  archive: ^4.0.9
  html: ^0.15.4

  # Text-to-speech (read-aloud) — wraps iOS AVSpeechSynthesizer.
  flutter_tts: ^4.2.0

  # Gapless playback of the per-sentence MP3 clips streamed from the optional
  # self-hosted Kokoro voice server (the "natural voices" read-aloud engine).
  just_audio: ^0.10.6

  # Configures the iOS audio session for high-quality spoken-audio playback —
  # without this, just_audio can default to a record-capable category that
  # routes to the earpiece / low-quality Bluetooth HFP codec (tinny/robotic).
  audio_session: ^0.2.4
  # Pinned to 12.x: share_plus 13 needs win32 ^6, which conflicts with
  # file_picker's win32 ^5 (still true on file_picker 11). The
  # SharePlus.instance.share(ShareParams) API we use is identical across
  # 12 and 13. Same win32 clash holds wakelock_plus at 1.5.
  share_plus: ^12.0.2

  # Connection-type detection, so auto-download can be Wi-Fi-only.
  connectivity_plus: ^7.2.0

  # Picking EPUB files from Files / iCloud Drive to import sideloaded books.
  file_picker: ^11.0.2

  # Keeps the screen awake during hands-free reading (auto-scroll / auto-turn
  # / XR-glasses use, where the phone is the source display).
  wakelock_plus: ^1.5.2

  # iOS Keychain storage for the OPDS password (plain SharedPreferences is
  # readable from device backups; Keychain is not).
  flutter_secure_storage: ^10.3.1
  drift: ^2.34.0
  drift_flutter: ^0.3.0

  # Crash reporting. Fully disabled unless a SENTRY_DSN --dart-define is
  # baked in at build time (see main.dart + codemagic.yaml).
  # (8.14.x failed to compile on CI: its Swift plugin used a sentry-cocoa
  # internal that newer pods renamed — keep this current.)
  sentry_flutter: ^9.23.0

  # Opt-in daily reading reminders (see reminder_service.dart). Local
  # notifications only — no entitlement needed, unlike push. timezone +
  # flutter_timezone come with it: scheduling is wall-clock local ("8:30pm
  # where the reader is"), which needs the device's zone to resolve.
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  # Lets widget tests stub path_provider (no real platform in `flutter test`).
  path_provider_platform_interface: ^2.1.0
  drift_dev: ^2.34.0
  build_runner: ^2.15.0

# Pin path_provider's iOS implementation below the version that adopted the
# `objective_c` package. objective_c ships an arm64e-only framework that App
# Store Connect rejects (error 91080); older path_provider_foundation uses
# plain method channels and avoids it entirely.
dependency_overrides:
  path_provider_foundation: 2.4.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # Bundled reading fonts (OFL — licences alongside the files). Family
  # names match the long-standing kReaderFonts entries, so settings saved
  # when these were fetched via google_fonts keep working; bundling means
  # they render correctly offline from the very first launch.
  fonts:
    - family: Literata
      fonts:
        - asset: assets/fonts/Literata-Regular.ttf
        - asset: assets/fonts/Literata-Italic.ttf
          style: italic
        - asset: assets/fonts/Literata-Bold.ttf
          weight: 700
        - asset: assets/fonts/Literata-BoldItalic.ttf
          weight: 700
          style: italic
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Regular.ttf
        - asset: assets/fonts/Lora-Italic.ttf
          style: italic
        - asset: assets/fonts/Lora-Bold.ttf
          weight: 700
        - asset: assets/fonts/Lora-BoldItalic.ttf
          weight: 700
          style: italic
    - family: Atkinson Hyperlegible
      fonts:
        - asset: assets/fonts/AtkinsonHyperlegible-Regular.ttf
        - asset: assets/fonts/AtkinsonHyperlegible-Italic.ttf
          style: italic
        - asset: assets/fonts/AtkinsonHyperlegible-Bold.ttf
          weight: 700
        - asset: assets/fonts/AtkinsonHyperlegible-BoldItalic.ttf
          weight: 700
          style: italic
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.otf
        - asset: assets/fonts/OpenDyslexic-Italic.otf
          style: italic
        - asset: assets/fonts/OpenDyslexic-Bold.otf
          weight: 700
        - asset: assets/fonts/OpenDyslexic-Bold-Italic.otf
          weight: 700
          style: italic

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
